<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="900" viewBox="0 0 1050 900" role="img" aria-labelledby="title desc">
  <title id="title">Poprawiona geometria klasycznej litery T</title>
  <desc id="desc">Klasyczna litera T zlozona z czterech klockow zgodnych ze wzorem: lewego trojkata, centralnego pieciokata, prawego trapezu i dolnego trapezu trzonu.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto-start-reverse">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#172033"/>
    </marker>
    <style>
      .page { fill: #f8fafc; }
      .title { font: 800 34px Arial, sans-serif; fill: #101828; }
      .subtitle { font: 500 19px Arial, sans-serif; fill: #475467; }
      .grid { stroke: #d8dee8; stroke-width: 1.2; }
      .tile { fill: #9fc5ff; stroke: #101828; stroke-width: 4; vector-effect: non-scaling-stroke; }
      .tile-label { font: 900 34px Arial, sans-serif; fill: #101828; paint-order: stroke; stroke: #ffffff; stroke-width: 8; }
      .dimension { stroke: #172033; stroke-width: 2.5; marker-start: url(#arrow); marker-end: url(#arrow); }
      .dimension.diagonal { stroke: #344054; }
      .dimension.strong { stroke-width: 3.5; }
      .dimension-label { font: 800 17px Arial, sans-serif; fill: #172033; paint-order: stroke; stroke: #f8fafc; stroke-width: 5; }
      .legend { font: 500 18px Arial, sans-serif; fill: #475467; }
    </style>
  </defs>
  <rect class="page" width="1050" height="900"/>
  <text x="52" y="56" class="title">Poprawiona litera T z 4 klockow</text>
  <text x="52" y="88" class="subtitle">Odwzorowanie wzoru: szerokosc belki 3a, wysokosc belki a, wszystkie ciecia ukosne pod katem 45 stopni.</text>
  <line x1="210.000" y1="145.000" x2="210.000" y2="684.167" class="grid"/><line x1="380.000" y1="145.000" x2="380.000" y2="684.167" class="grid"/><line x1="550.000" y1="145.000" x2="550.000" y2="684.167" class="grid"/><line x1="720.000" y1="145.000" x2="720.000" y2="684.167" class="grid"/><line x1="210.000" y1="145.000" x2="720.000" y2="145.000" class="grid"/><line x1="210.000" y1="315.000" x2="720.000" y2="315.000" class="grid"/><line x1="210.000" y1="485.000" x2="720.000" y2="485.000" class="grid"/><line x1="210.000" y1="684.167" x2="720.000" y2="684.167" class="grid"/>
  <polygon points="210.000,145.000 380.000,315.000 210.000,315.000" class="tile"/>
<text x="257.600" y="260.600" class="tile-label">A</text>
<polygon points="210.000,145.000 450.416,145.000 620.416,315.000 550.000,315.000 550.000,485.000" class="tile"/>
<text x="427.600" y="270.800" class="tile-label">B</text>
<polygon points="450.416,145.000 720.000,145.000 720.000,315.000 620.416,315.000" class="tile"/>
<text x="631.600" y="250.400" class="tile-label">C</text>
<polygon points="380.000,315.000 550.000,485.000 550.000,684.167 380.000,684.167" class="tile"/>
<text x="444.600" y="583.600" class="tile-label">D</text>
  <line x1="210.000" y1="104.200" x2="450.416" y2="104.200" class="dimension"/>
<text x="303.500" y="87.200" class="dimension-label">sqrt(2)a</text>
<line x1="450.416" y1="104.200" x2="720.000" y2="104.200" class="dimension"/>
<text x="526.200" y="87.200" class="dimension-label">(3-sqrt(2))a</text>
<line x1="179.400" y1="145.000" x2="179.400" y2="315.000" class="dimension"/>
<text x="148.800" y="243.600" class="dimension-label">a</text>
<line x1="210.000" y1="345.600" x2="380.000" y2="345.600" class="dimension"/>
<text x="284.800" y="372.800" class="dimension-label">a</text>
<line x1="223.600" y1="301.400" x2="366.400" y2="158.600" class="dimension diagonal"/>
<text x="227.000" y="216.400" class="dimension-label">sqrt(2)a</text>
<line x1="223.600" y1="158.600" x2="536.400" y2="471.400" class="dimension diagonal strong"/>
<text x="356.200" y="291.200" class="dimension-label">2sqrt(2)a</text>
<line x1="464.016" y1="158.600" x2="606.816" y2="301.400" class="dimension diagonal"/>
<text x="519.400" y="216.400" class="dimension-label">sqrt(2)a</text>
<line x1="550.000" y1="345.600" x2="620.416" y2="345.600" class="dimension"/>
<text x="553.400" y="383.000" class="dimension-label">(sqrt(2)-1)a</text>
<line x1="620.416" y1="372.800" x2="720.000" y2="372.800" class="dimension"/>
<text x="638.400" y="410.200" class="dimension-label">(2-sqrt(2))a</text>
<line x1="580.600" y1="315.000" x2="580.600" y2="485.000" class="dimension"/>
<text x="597.600" y="413.600" class="dimension-label">a</text>
<line x1="580.600" y1="485.000" x2="580.600" y2="684.167" class="dimension"/>
<text x="604.400" y="617.600" class="dimension-label">(4-2sqrt(2))a</text>
<line x1="349.400" y1="315.000" x2="349.400" y2="684.167" class="dimension"/>
<text x="213.400" y="573.400" class="dimension-label">(5-2sqrt(2))a</text>
<line x1="380.000" y1="718.167" x2="550.000" y2="718.167" class="dimension"/>
<text x="454.800" y="745.367" class="dimension-label">a</text>
  <text x="52" y="820" class="legend">Klocki: A - lewy trojkat; B - centralny pieciokat; C - prawy trapez; D - dolny trapez trzonu.</text>
</svg>
